name: skivori-backend

services:
  app:
    build: .
    ports:
      - 3333:3333
    env_file: .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data

volumes:
  pg-data:
  redis-data:
